[package]
name = "tgrustc"
authors = ["Tangram <root@tangram.dev>"]
description = "A RUSTC_WRAPPER that spawns cacheable tangram processes for rustc invocations."
edition = "2024"
homepage = "https://www.tangram.dev"
license = "MIT"
publish = false
repository = "https://github.com/tangramdotdev/packages"
rust-version = "1.91"
version = "0.0.0"

[lints.clippy]
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_safety_doc = "allow"
pedantic = { level = "warn", priority = -1 }
result_large_err = "allow"

[dependencies]
rustix = { version = "1", features = ["stdio"] }
tangram_client = { default-features = false, git = "https://github.com/tangramdotdev/tangram", rev = "08aa8ec2e906c391b3acc59148f6290943a7c030" }
tokio = { version = "1", default-features = false, features = ["rt", "fs"] }

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = true
