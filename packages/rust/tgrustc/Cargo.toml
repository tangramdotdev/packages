[package]
name = "tgrustc"
authors = ["Tangram <root@tangram.dev>"]
description = "Wrapper for the rustc binary to spawn tangram processes"
edition = "2024"
homepage = "https://www.tangram.dev"
license = "MIT"
publish = false
repository = "https://github.com/tangramdotdev/packages"
rust-version = "1.91"
version = "0.0.0"

[lints.clippy]
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_safety_doc = "allow"
pedantic = { level = "warn", priority = -1 }
result_large_err = "allow"

[dependencies]
fnv = "1"
futures = "0.3"
rustix = { version = "1", features = ["stdio"] }
tangram_client = { default-features = false, git = "https://github.com/tangramdotdev/tangram", rev = "9a7bf6869e17d0cb975ddaf767618148ecfc9b4a" }
tangram_futures = { git = "https://github.com/tangramdotdev/tangram", rev = "9a7bf6869e17d0cb975ddaf767618148ecfc9b4a" }
glob = "0.3"
tangram_std = { package = "common", path = "../../std/packages/common" }
toml_edit = "0.23"
tokio = { version = "1", default-features = false, features = [
  "rt",
  "fs",
] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json"] }

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = true
